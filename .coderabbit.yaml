# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: 'ko-KR'
early_access: false

reviews:
  profile: 'assertive'

  # Summary
  high_level_summary: true
  high_level_summary_instructions: |
    변경 사항을 한국어로 bullet point 리스트로 간결하게 요약해줘.
    변경 이유와 영향받은 모듈을 포함해줘.
  high_level_summary_in_walkthrough: true
  # Walkthrough
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: false
  suggested_labels: true
  auto_apply_labels: false

  # Statuses
  review_status: true
  commit_status: true
  fail_commit_status: false

  # Behavior
  request_changes_workflow: false
  auto_assign_reviewers: false

  # Finishing touches
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: true

  # Label suggestions
  labeling_instructions:
    - label: 'algorithm'
      instructions: 'SPICE 엔진, 수치해석 알고리즘(solver, analysis, matrix) 관련 변경'
    - label: 'bug'
      instructions: '버그나 오류 수정'
    - label: 'documentation'
      instructions: 'README, 주석, API 문서 등 문서 관련 변경'
    - label: 'enhancement'
      instructions: '기존 기능의 동작 방식이나 품질을 개선하는 변경'
    - label: 'feature'
      instructions: '새로운 기능 추가'
    - label: 'performance'
      instructions: '성능 최적화, 연산 효율화, GPU 가속 관련 변경'
    - label: 'phase-1-mvp'
      instructions: '엔진 코어(회로 소자, solver, analysis) 관련 변경 — 1단계 범위'
    - label: 'phase-2-ui'
      instructions: 'Canvas, 그래프, 시각적 인터페이스 관련 변경 — 2단계 범위'
    - label: 'phase-3-ux'
      instructions: '드래그앤드롭, 고급 UX 관련 변경 — 3단계 범위'
    - label: 'priority-high'
      instructions: '크리티컬 경로(solver, analysis)에 영향을 주거나 블로킹 이슈를 수반하는 변경'
    - label: 'priority-medium'
      instructions: '일반적인 중요도의 변경'
    - label: 'priority-low'
      instructions: '즉각 처리가 불필요한 소규모 개선이나 정리 작업'
    - label: 'refactor'
      instructions: '기능 변경 없이 코드 구조, 가독성, 유지보수성을 개선하는 변경'
    - label: 'ui'
      instructions: 'React 컴포넌트, 스타일, 레이아웃 등 UI 관련 변경'

  # Path filters
  path_filters:
    - '!dist/**'
    - '!coverage/**'
    - '!node_modules/**'
    - '!**/*.lock'
    - '!**/*.min.js'

  # Path instructions
  path_instructions:
    - path: 'src/engine/**'
      instructions: |
        SPICE 수치 계산 엔진 코드입니다.
        순수 함수와 불변 객체 반환 패턴을 유지하는지 확인해줘.
        수치 안정성(NaN, Infinity, 0 나누기, 특이 행렬 등 엣지 케이스) 처리를 꼼꼼히 검토해줘.
        WebSpiceError를 사용하는 에러 처리가 ADR-002 원칙(caller가 코드별로 다른 처리를 해야 하는 경우에만 새 코드 추가)을 따르는지 확인해줘.
    - path: 'src/engine/solver/**'
      instructions: |
        행렬 연산, LU 분해, MNA 어셈블러 관련 코드입니다.
        수치 정밀도와 피벗팅 전략의 안정성을 검토해줘.
        COO/CSR 희소 행렬 포맷 변환 로직의 정확성과 인덱스 경계 처리를 확인해줘.
    - path: 'tests/**'
      instructions: |
        Vitest 기반 TDD 테스트 코드입니다. 테스트 환경은 node입니다.
        AAA(Arrange-Act-Assert) 패턴을 따르는지 확인해줘.
        describe/it 블록 네이밍이 명확한지 검토해줘.
        엣지 케이스(NaN, Infinity, 빈 값, 경계값) 커버리지를 확인해줘.
        create* 팩토리 함수(tests/factories/)와 UPPER_SNAKE_CASE 픽스처(tests/fixtures/)로 테스트 데이터를 생성하는지 확인해줘.
        tests/setup.ts에 정의된 커스텀 매처(toThrowWebSpiceError 등)를 적절히 활용하는지 확인해줘.
    - path: 'tests/store/**'
      instructions: |
        Redux 슬라이스 테스트입니다. 아래 규칙은 tests/** 일반 규칙보다 우선 적용합니다.
        CircuitState, SimulationState 등 Redux 상태 객체는 인라인 리터럴로 직접 작성하는 것이 정상입니다.
        이 파일들에는 tests/factories/의 create* 팩토리 패턴 적용을 강제하지 마세요 — CircuitState/SimulationState용 factory는 존재하지 않으며 의도적으로 만들지 않습니다.
        Circuit/Component 객체는 tests/fixtures/의 UPPER_SNAKE_CASE 상수(VOLTAGE_DIVIDER_12V 등)를 사용하는 것이 올바른 패턴입니다.
    - path: 'src/types/**'
      instructions: |
        TypeScript 타입 정의 파일입니다.
        any 타입 사용 여부를 확인해줘.
        타입의 재사용성과 명확성을 검토해줘.
    - path: 'src/components/**'
      instructions: |
        React 19 함수형 컴포넌트입니다.
        babel-plugin-react-compiler와 충돌하는 패턴이 없는지 확인해줘.
        접근성(a11y) 관련 이슈를 검토해줘.

code_generation:
  unit_tests:
    path_instructions:
      - path: 'src/engine/**'
        instructions: |
          Vitest를 사용해 테스트를 작성해줘. 테스트 환경은 node입니다.
          create* 팩토리 함수(tests/factories/)와 UPPER_SNAKE_CASE 픽스처(tests/fixtures/)로 테스트 데이터를 생성해줘.
          AAA 패턴을 따르고, NaN/Infinity/경계값 엣지 케이스를 포함해줘.
          tests/setup.ts의 커스텀 매처(toThrowWebSpiceError)를 활용해줘.
